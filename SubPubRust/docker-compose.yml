version: "3.9"

services:
  nats:
    image: nats:latest
    container_name: nats
    ports:
      - "4222:4222"
      - "8222:8222"
    command: ["-js"]
    restart: unless-stopped

  subpubrust:
    build:
      context: .
      dockerfile: Dockerfile
    image: registry.gitlab.com/gcoder.ninhph/sub-pub-rust:latest
    container_name: subpubrust
    depends_on:
      - nats
    environment:
      - NATS_URL=nats://nats:4222
      - GRID_SIZE=100
    restart: unless-stopped
